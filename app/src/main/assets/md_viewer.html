<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
  :root {
    --bg:        #1A1A1A;
    --gold:      #C9A84C;
    --text:      #E8E0D0;
    --text-dim:  #7A7163;
    --text-soft: #9A9080;
    --border:    #2D2D2D;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans SC', 'Noto Sans', 'PingFang SC', sans-serif;
    font-size: 15px;
    line-height: 1.75;
    word-break: break-word;
    min-height: 100vh;
  }

  h1, h2, h3, h4 {
    color: var(--gold);
    font-weight: 700;
    margin: 18px 0 6px;
    line-height: 1.3;
  }
  h1 { font-size: 22px; }
  h2 { font-size: 18px; }
  h3 { font-size: 15px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  h4 { font-size: 14px; }

  p { margin: 0 0 8px; }

  ul, ol { padding-left: 20px; margin: 4px 0 8px; }
  li { margin: 3px 0; }

  code {
    background: rgba(255,255,255,0.08);
    border-radius: 4px;
    padding: 2px 6px;
    font-size: 13px;
    font-family: 'Courier New', monospace;
    color: var(--gold);
  }

  pre {
    background: rgba(0,0,0,0.45);
    border-radius: 6px;
    padding: 12px 16px;
    margin: 8px 0;
    overflow-x: auto;
  }
  pre code { background: none; padding: 0; color: var(--text); font-size: 13px; }

  blockquote {
    border-left: 3px solid var(--gold);
    margin: 8px 0;
    padding-left: 16px;
    color: var(--text-soft);
  }

  strong { color: #F0C040; font-weight: 700; }
  em { color: #b8a888; font-style: italic; }
  a { color: var(--gold); text-decoration: none; }
  hr { border: none; border-top: 1px solid var(--border); margin: 14px 0; }

  .hint {
    color: var(--text-dim);
    font-size: 14px;
    font-style: italic;
    text-align: center;
    margin-top: 60px;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #3A3A3A; border-radius: 2px; }
</style>
</head>
<body>
<div id="content"><p class="hint">加载中…</p></div>
<script src="marked.umd.js"></script>
<script>
  function renderMarkdown(text) {
    var el = document.getElementById('content');
    if (!text || !text.trim()) {
      el.innerHTML = '<p class="hint">记录今天的想法、灵感…</p>';
      return;
    }
    el.innerHTML = marked.parse(text, { async: false, breaks: true });
  }

  // Kotlin passes content as UTF-8 base64 to avoid JS string escaping issues
  function renderBase64(b64) {
    try {
      var binary = atob(b64);
      var bytes = new Uint8Array(binary.length);
      for (var i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      var text = new TextDecoder('utf-8').decode(bytes);
      renderMarkdown(text);
    } catch (e) {
      renderMarkdown('');
    }
  }
</script>
</body>
</html>
