<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; font-src 'self';">
<title>tPlanner — 随手记</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: rgba(24,24,24,0.97);
    --surface: rgba(34,34,34,0.97);
    --void: #0E0E0E;
    --border: #2D2D2D;
    --border-bright: #404040;
    --gold: #C9A84C;
    --gold-dim: rgba(201,168,76,0.18);
    --text: #E8E0D0;
    --text-dim: #7A7163;
    --text-soft: #9A9080;
  }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    font-size: 13px;
    overflow: hidden;
    border-radius: 10px;
    border: 1px solid var(--border-bright);
    border-top: 3px solid var(--gold);
  }

  #app { display: flex; flex-direction: column; height: 100%; border-radius: 10px; overflow: hidden; }

  /* ── Header ──────────────────────────────────────────── */
  header {
    -webkit-app-region: drag;
    padding: 8px 12px 7px;
    background: var(--void);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .hdr-title {
    font-size: 11px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .hdr-right {
    -webkit-app-region: no-drag;
    display: flex;
    gap: 2px;
  }
  .icon-btn {
    width: 24px; height: 24px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 3px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 13px; line-height: 1;
    font-family: inherit;
    transition: all 120ms ease;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
  .icon-btn.active { color: var(--gold); }
  .icon-btn.danger:hover { background: rgba(192,57,43,0.18); color: #F0A090; }

  /* ── Body ────────────────────────────────────────────── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 0;
    overflow: hidden;
  }
  #notes-input {
    flex: 1;
    width: 100%;
    background: var(--surface);
    border: none;
    color: var(--text);
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    font-size: 13px;
    line-height: 1.65;
    padding: 10px 12px;
    resize: none;
    outline: none;
  }
  #notes-input::placeholder { color: var(--text-dim); }

  /* ── Footer ──────────────────────────────────────────── */
  footer {
    -webkit-app-region: drag;
    padding: 4px 12px;
    background: var(--void);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    align-items: center;
    flex-shrink: 0;
  }
  #save-indicator {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    -webkit-app-region: no-drag;
    opacity: 0;
    transition: opacity 200ms;
  }
  #save-indicator.visible { opacity: 1; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="hdr-title">随手记</div>
    <div class="hdr-right">
      <button class="icon-btn" id="btn-pin" title="始终置顶">↴</button>
      <button class="icon-btn" id="btn-open" title="打开 tPlanner">↗</button>
      <button class="icon-btn danger" id="btn-close" title="关闭">✕</button>
    </div>
  </header>

  <main>
    <textarea id="notes-input" placeholder="记录今天的想法、灵感…"></textarea>
  </main>

  <footer>
    <span id="save-indicator">已保存</span>
  </footer>
</div>
<script src="notes-widget.js"></script>
</body>
</html>
