<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self'; font-src 'self' https://fonts.gstatic.com;">
<title>tPlanner — 今日</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=pinboard" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=progress_activity" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=event_available" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=warning" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: rgba(24,24,24,0.96);
    --surface: rgba(34,34,34,0.96);
    --void: #0E0E0E;
    --border: #2D2D2D;
    --border-bright: #404040;
    --gold: #C9A84C;
    --gold-bright: #F0C040;
    --gold-dim: rgba(201,168,76,0.18);
    --red: #C0392B;
    --green: #4A7C59;
    --text: #E8E0D0;
    --text-dim: #7A7163;
    --text-soft: #9A9080;
  }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    font-size: 13px;
    line-height: 1.5;
    overflow: hidden;
    /* Round the whole window — possible because BrowserWindow is transparent */
    border-radius: 10px;
    border: 1px solid var(--border-bright);
    border-top: 3px solid var(--gold);
  }

  #app { display: flex; flex-direction: column; height: 100%; border-radius: 10px; overflow: hidden; }

  /* ── Header (drag handle) ───────────────────────────────────────── */
  header {
    -webkit-app-region: drag;
    padding: 10px 12px 8px;
    background: var(--void);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .hdr-left {
    display: flex; flex-direction: column; gap: 1px;
  }
  .hdr-date {
    font-size: 14px; font-weight: 600; color: var(--gold);
    letter-spacing: 0.04em;
  }
  .hdr-sub {
    font-size: 10px; color: var(--text-dim);
    letter-spacing: 0.08em;
  }
  .hdr-right {
    -webkit-app-region: no-drag;
    display: flex; gap: 2px;
  }
  .icon-btn {
    width: 24px; height: 24px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 3px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 13px; line-height: 1;
    font-family: inherit;
    transition: all 120ms ease;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.06); color: var(--text); }
  .icon-btn.active { color: var(--gold); }
  .icon-btn.danger:hover { background: rgba(192,57,43,0.18); color: #F0A090; }

  /* ── Material Symbols ──────────────────────────────────────────── */
  .material-symbols-outlined {
    font-family: 'Material Symbols Outlined';
    font-weight: normal;
    font-style: normal;
    line-height: 1;
    letter-spacing: normal;
    text-transform: none;
    display: inline-block;
    white-space: nowrap;
    word-wrap: normal;
    direction: ltr;
    -webkit-font-feature-settings: 'liga';
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'liga';
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    user-select: none;
  }
  .icon-btn .material-symbols-outlined { font-size: 18px; }
  .empty-icon.material-symbols-outlined { font-size: 32px; }

  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .spin { animation: spin 1.4s linear infinite; transform-origin: 50% 50%; }

  /* ── Body / list ───────────────────────────────────────────────── */
  main {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 6px 8px;
  }
  .group-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 8px 4px 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .group-label .count { color: var(--gold-dim); font-weight: 600; }

  .item {
    display: flex;
    gap: 8px;
    padding: 8px 8px;
    border-radius: 4px;
    margin-bottom: 2px;
    border-left: 3px solid transparent;
    cursor: default;
  }
  .item:hover { background: rgba(255,255,255,0.03); }
  .item.now { background: var(--gold-dim); border-left-color: var(--gold); }
  .item.now .item-time { color: var(--gold); font-weight: 600; }
  .item.past { opacity: 0.45; }
  .item.task .item-bullet { cursor: pointer; }

  .item-bullet {
    width: 14px; height: 14px;
    border: 1.5px solid var(--border-bright);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 3px;
    position: relative;
    background: transparent;
  }
  .item-bullet.color-bar {
    /* Used for non-task events: a thin colored slab instead of a circle */
    width: 4px;
    height: 28px;
    border-radius: 2px;
    border: none;
    margin-top: 0;
  }
  .item.task.done .item-bullet {
    background: var(--gold);
    border-color: var(--gold);
  }
  .item.task.done .item-bullet::after {
    content: '✓'; color: #0A0A0A; font-size: 10px; font-weight: 700;
    position: absolute; top: -3px; left: 1px;
  }
  .item.task.done .item-title { text-decoration: line-through; color: var(--text-dim); }

  /* ── Subtask list ──────────────────────────────────────────────── */
  .subtask-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    margin-top: 5px;
    padding-left: 4px;
    border-left: 2px solid var(--border-bright);
  }
  .subtask-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 2px 0;
    cursor: pointer;
    border-radius: 2px;
  }
  .subtask-item:hover { background: rgba(255,255,255,0.04); }
  .subtask-bullet {
    width: 11px; height: 11px;
    border: 1.5px solid var(--border-bright);
    border-radius: 3px;
    flex-shrink: 0;
    position: relative;
    background: transparent;
  }
  .subtask-bullet.done {
    background: var(--gold);
    border-color: var(--gold);
  }
  .subtask-bullet.done::after {
    content: '✓'; color: #0A0A0A; font-size: 8px; font-weight: 700;
    position: absolute; top: -2px; left: 0px;
  }
  .subtask-text {
    font-size: 11px;
    color: var(--text-soft);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .subtask-text.done { text-decoration: line-through; color: var(--text-dim); }
  .subtask-toggle {
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    font-size: 10px; padding: 0 2px; line-height: 1;
  }
  .subtask-toggle:hover { color: var(--text); }
  .progress-badge {
    font-size: 9px;
    font-family: 'Segoe UI', sans-serif;
    padding: 1px 5px;
    border-radius: 3px;
    background: rgba(0,0,0,0.3);
    color: var(--text-dim);
    flex-shrink: 0;
    letter-spacing: 0.02em;
  }
  .progress-badge.done-all {
    background: rgba(74,124,89,0.35);
    color: #7EC897;
  }

  .item-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 1px;
    min-width: 0;
  }
  .item-row1 {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 6px;
  }
  .item-time {
    font-size: 11px;
    color: var(--text-soft);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
    flex-shrink: 0;
  }
  .item-tag {
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 1px 5px;
    border-radius: 2px;
    background: var(--border);
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .item-tag.now { background: var(--gold); color: #0A0A0A; font-weight: 700; }
  .item-tag.soon { background: rgba(201,168,76,0.3); color: var(--gold-bright); }
  .item-tag.done { background: rgba(74,124,89,0.3); color: #7EC897; }
  .item-title {
    font-size: 13px;
    color: var(--text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .item-note {
    font-size: 11px;
    color: var(--text-dim);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Empty state ───────────────────────────────────────────────── */
  .empty {
    text-align: center;
    padding: 36px 20px;
    color: var(--text-dim);
  }
  .empty-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.4; }
  .empty-text { font-size: 12px; letter-spacing: 0.04em; }

  /* ── Footer ────────────────────────────────────────────────────── */
  footer {
    -webkit-app-region: drag;
    padding: 6px 12px;
    background: var(--void);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.04em;
  }
  footer .stats { display: flex; gap: 8px; }
  footer .stats span { font-variant-numeric: tabular-nums; }
  footer .actions { -webkit-app-region: no-drag; }
  .link-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 10px;
    font-family: inherit;
    letter-spacing: 0.04em;
    padding: 2px 4px;
  }
  .link-btn:hover { color: var(--gold); }

  /* ── Journal (随笔) ────────────────────────────────────────────── */
  .journal-section {
    border-top: 1px solid var(--border);
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }
  .journal-label {
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .journal-textarea {
    width: 100%;
    min-height: 60px;
    max-height: 120px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
    font-size: 12px;
    line-height: 1.5;
    padding: 6px 8px;
    resize: vertical;
    outline: none;
    transition: border-color 120ms;
  }
  .journal-textarea:focus { border-color: var(--gold); }
  .journal-textarea::placeholder { color: var(--text-dim); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="hdr-left">
      <div class="hdr-date" id="hdr-date">--</div>
      <div class="hdr-sub" id="hdr-sub">今日事件</div>
    </div>
    <div class="hdr-right">
      <button class="icon-btn" id="btn-pin" title="始终置顶">↴</button>
      <button class="icon-btn" id="btn-open" title="打开 tPlanner">↗</button>
      <button class="icon-btn danger" id="btn-close" title="关闭便签">✕</button>
    </div>
  </header>

  <main id="list">
    <div class="empty">
      <div class="empty-icon material-symbols-outlined spin">progress_activity</div>
      <div class="empty-text">加载中…</div>
    </div>
  </main>

  <div class="journal-section">
    <div class="journal-label">随笔记录</div>
    <textarea class="journal-textarea" id="journal-input" placeholder="记录今天的想法…"></textarea>
  </div>

  <footer>
    <div class="stats" id="stats"><span>--</span></div>
    <div class="actions">
      <button class="link-btn" id="btn-refresh">↻ 刷新</button>
    </div>
  </footer>
</div>
<script src="widget.js"></script>
</body>
</html>
