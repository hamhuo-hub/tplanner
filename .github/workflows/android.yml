name: Android Build

# 触发条件：
#   1. 推送 v 开头的 tag（如 v3.3.1）→ 构建 APK 并上传到 GitHub Release
#   2. 手动触发（Actions 页面点 "Run workflow"）→ 只构建、上传产物，便于测试
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.4.1   # 与 gradle/wrapper/gradle-wrapper.properties 保持一致

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tplanner-android
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')   # 仅在 tag 触发时发布
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: tplanner-android
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: artifacts/**/*
          # 自动使用内置的 GITHUB_TOKEN，无需额外配置 PAT
