<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 256 256"
     width="256"
     height="256"
     role="img"
     aria-labelledby="title description"
     shape-rendering="geometricPrecision">
  <title id="title">tPlanner — Chronicle Bind</title>
  <desc id="description">Independent fragments widen as they approach a dense central chronicle spine.</desc>

  <rect x="8" y="8" width="240" height="240" rx="54" fill="#0E0E0E"/>

  <!-- The archive is concentrated rather than closed: thin at both open ends,
       dense in the centre where separate records gain context. -->
  <path fill="#C9A84C" d="
    M124 46
    Q130 40 136 46
    C136 72 137 91 144 108
    C150 123 150 137 144 152
    C137 171 137 189 139 210
    Q133 216 127 210
    C126 189 126 171 117 153
    C111 138 111 123 117 108
    C123 91 123 70 124 46Z"/>

  <!-- Three captured fragments remain distinct. Their traces widen inward,
       showing that raw notes become more substantial near the archive. -->
  <circle cx="51" cy="68" r="8" fill="#E8E0D0"/>
  <path fill="#E8E0D0" d="
    M72 77
    C84 85 96 96 105 109
    L94 124
    C85 108 76 96 67 87
    Q65 81 72 77Z"/>

  <circle cx="207" cy="91" r="8" fill="#C9A84C"/>
  <path fill="#C9A84C" d="
    M188 102
    Q194 107 190 113
    C181 119 176 130 170 142
    L159 128
    C167 116 178 106 188 102Z"/>

  <!-- Teal identifies the live/current fragment without turning the centre
       into a status light or generic network hub. -->
  <circle cx="51" cy="199" r="9" fill="#4A9DA8"/>
  <path fill="#E8E0D0" d="
    M70 177
    Q65 183 71 188
    C82 181 94 171 104 160
    L95 144
    C84 157 76 168 70 177Z"/>
</svg>
